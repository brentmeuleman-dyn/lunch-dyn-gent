<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu – Lunch Dynapps Gent</title>
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              purple:        '#7B00DC',
              'purple-d':    '#6200b0',
              'purple-l':    '#951CF3',
              'purple-bg':   '#f5edff',
              'purple-ring': '#d8b4fe',
              red:           '#DC3545',
              'red-d':       '#b82d3a',
              navy:          '#010114',
            }
          },
          fontFamily: { sans: ['Readex Pro', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-brand-navy">

<!-- Header -->
<header class="bg-brand-navy shadow-sm sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">🍽️ Menu – Lunch Dynapps Gent</h1>
      <p id="deadline-badge" class="text-xs text-gray-400 mt-0.5"></p>
    </div>
    <nav class="flex items-center gap-4">
      <a href="/" class="text-sm text-white hover:underline font-medium">Bestelformulier</a>
      <a href="/admin" class="text-sm text-white hover:underline font-medium">Admin</a>
      <a href="/schulden" class="text-sm text-white hover:underline font-medium">Schulden</a>
      <a href="/menu" class="text-sm text-white font-semibold underline">Menu</a>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6 space-y-6">

  <!-- Scrape actie -->
  <section class="bg-white rounded-2xl shadow-sm p-5 flex items-center justify-between">
    <div>
      <h2 class="font-semibold text-brand-navy">Menulijst</h2>
      <p class="text-xs text-gray-400 mt-0.5">Producten worden elke weekdag om 07:30 automatisch bijgewerkt.</p>
    </div>
    <button onclick="scrapeMenu()"
            class="bg-brand-purple hover:bg-brand-purple-d text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition">
      ↻ Scrape website
    </button>
  </section>

  <div id="scrape-status" class="hidden text-sm rounded-2xl px-5 py-3 font-medium"></div>

  <!-- Nieuw item toevoegen -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <h2 class="font-semibold text-brand-navy mb-4">Item toevoegen</h2>
    <div class="flex flex-wrap gap-2">
      <input id="new-item-name" type="text" placeholder="Naam *"
             class="flex-1 min-w-32 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-purple-ring" />
      <select id="new-item-category"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-purple-ring">
        <option value="Kazen">Kazen</option>
        <option value="Vleeswaren">Vleeswaren</option>
        <option value="Vis &amp; schaaldieren">Vis &amp; schaaldieren</option>
        <option value="Veggie">Veggie</option>
        <option value="Samengestelde broodjes">Samengestelde broodjes</option>
        <option value="Wraps">Wraps</option>
        <option value="Schotels">Schotels</option>
        <option value="Overige">Overige</option>
      </select>
      <input id="new-item-price" type="number" step="0.01" placeholder="Prijs (€)"
             class="w-28 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-purple-ring" />
      <button onclick="addMenuItem()"
              class="bg-brand-purple hover:bg-brand-purple-d text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
        + Toevoegen
      </button>
    </div>
  </section>

  <!-- Menulijst per categorie -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <div id="menu-list" class="space-y-1 text-sm">
      <p class="text-gray-400 text-center py-4">Laden…</p>
    </div>
  </section>

</main>

<script>
const API = '';

function renderDeadline() {
  const now = new Date();
  const deadline = new Date(); deadline.setHours(10, 0, 0, 0);
  const badge = document.getElementById('deadline-badge');
  if (now > deadline) {
    badge.textContent = '⛔ Besteldeadline verstreken (10:00)';
    badge.classList.add('text-red-400');
  } else {
    const diff = Math.round((deadline - now) / 60000);
    badge.textContent = `⏰ Bestellen kan nog – deadline om 10:00 (nog ${diff} min)`;
  }
}

async function init() {
  renderDeadline();
  await loadMenuList();
}

async function loadMenuList() {
  const res   = await fetch(`${API}/api/menu`);
  const items = await res.json();
  const container = document.getElementById('menu-list');

  if (!items.length) {
    container.innerHTML = '<p class="text-gray-400 text-center py-4">Geen menu-items gevonden.</p>';
    return;
  }

  const byCategory = items.reduce((acc, i) => {
    (acc[i.category] = acc[i.category] || []).push(i);
    return acc;
  }, {});

  container.innerHTML = Object.entries(byCategory).map(([cat, catItems]) => `
    <div class="mb-4">
      <p class="text-xs font-semibold text-brand-purple uppercase tracking-wide mb-1">${escHtml(cat)}</p>
      ${catItems.map(i => `
        <div class="flex items-center justify-between py-1.5 px-2 hover:bg-brand-purple-bg rounded-lg">
          <div class="flex-1 min-w-0">
            <span class="text-brand-navy">${escHtml(i.name)}</span>
            ${i.description ? `<span class="text-xs text-gray-400 ml-2 truncate">${escHtml(i.description)}</span>` : ''}
          </div>
          <div class="flex items-center gap-3 shrink-0">
            ${i.price != null ? `<span class="text-xs text-gray-400">€${i.price.toFixed(2)}</span>` : ''}
            ${i.garnish_price != null ? `<span class="text-xs text-gray-300">met: €${i.garnish_price.toFixed(2)}</span>` : ''}
            <button onclick="deleteMenuItem(${i.id})"
                    class="text-gray-300 hover:text-brand-red text-lg leading-none transition">×</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

async function addMenuItem() {
  const name     = document.getElementById('new-item-name').value.trim();
  const category = document.getElementById('new-item-category').value;
  const priceRaw = document.getElementById('new-item-price').value;
  const price    = priceRaw ? parseFloat(priceRaw) : null;
  if (!name) return;

  await fetch(`${API}/api/menu/item`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, category, price }),
  });
  document.getElementById('new-item-name').value  = '';
  document.getElementById('new-item-price').value = '';
  await loadMenuList();
}

async function deleteMenuItem(id) {
  if (!confirm('Item verwijderen?')) return;
  await fetch(`${API}/api/menu/item/${id}`, { method: 'DELETE' });
  await loadMenuList();
}

async function scrapeMenu() {
  const btn = document.querySelector('button[onclick="scrapeMenu()"]');
  btn.disabled = true;
  btn.textContent = '⏳ Bezig…';

  const statusEl = document.getElementById('scrape-status');
  const res  = await fetch(`${API}/api/menu/refresh`, { method: 'POST' });
  const data = await res.json();

  if (res.ok) {
    statusEl.className = 'text-sm rounded-2xl px-5 py-3 font-medium bg-green-50 border border-green-200 text-green-700';
    statusEl.textContent = '✅ ' + data.message;
  } else {
    statusEl.className = 'text-sm rounded-2xl px-5 py-3 font-medium bg-red-50 border border-red-200 text-brand-red';
    statusEl.textContent = '❌ ' + (data.detail || 'Onbekende fout');
  }
  statusEl.classList.remove('hidden');
  btn.disabled = false;
  btn.textContent = '↻ Scrape website';
  setTimeout(() => statusEl.classList.add('hidden'), 6000);
  await loadMenuList();
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
