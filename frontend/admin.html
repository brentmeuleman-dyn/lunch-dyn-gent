<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Lunch Dynapps Gent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<!-- Header -->
<header class="bg-white shadow-sm sticky top-0 z-10">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
    <h1 class="text-xl font-bold text-gray-800">⚙️ Admin – Lunch Dynapps Gent</h1>
    <a href="/" class="text-sm text-orange-500 hover:underline font-medium">← Bestelformulier</a>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

  <!-- Datumkiezer & acties -->
  <section class="bg-white rounded-2xl shadow-sm p-5 flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-40">
      <label class="text-xs font-medium text-gray-500 block mb-1">Datum</label>
      <input type="date" id="date-picker"
             class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
    </div>
    <button onclick="loadDate()"
            class="bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition">
      Laden
    </button>
    <button id="btn-send-email" onclick="sendEmail()"
            class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition disabled:opacity-40 disabled:cursor-not-allowed">
      📧 Mail versturen
    </button>
  </section>

  <div id="email-status" class="hidden text-sm rounded-2xl px-5 py-3 font-medium"></div>

  <!-- Bestellingen van de dag -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
      <h2 class="font-semibold text-gray-700">Bestellingen <span id="orders-date-label" class="text-gray-400 font-normal text-sm"></span></h2>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">Voorschieter:</span>
        <input id="advancer-input" type="text" placeholder="Naam…"
               class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-orange-400" />
        <button onclick="setAdvancer()"
                class="bg-gray-100 hover:bg-gray-200 text-sm text-gray-700 px-3 py-1.5 rounded-lg transition">
          Instellen
        </button>
      </div>
    </div>

    <div id="orders-table" class="overflow-x-auto">
      <p class="text-gray-400 text-sm text-center py-6">Selecteer een datum en klik op Laden.</p>
    </div>
  </section>

  <!-- Openstaande schulden -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <h2 class="font-semibold text-gray-700 mb-4">Openstaande schulden</h2>
    <div id="balances" class="space-y-4">
      <p class="text-gray-400 text-sm text-center py-4">Laden…</p>
    </div>
  </section>

  <!-- Menu beheren -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold text-gray-700">Menu beheren</h2>
      <button onclick="scrapeMenu()"
              class="text-xs text-orange-500 hover:underline">↻ Scrape website</button>
    </div>

    <!-- Nieuw item toevoegen -->
    <div class="flex flex-wrap gap-2 mb-4 p-3 bg-gray-50 rounded-xl">
      <input id="new-item-name"     type="text" placeholder="Naam *"
             class="flex-1 min-w-32 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
      <select id="new-item-category"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-400">
        <option value="Belegde broodjes">Belegde broodjes</option>
        <option value="Wraps">Wraps</option>
        <option value="Koude schotels &amp; maaltijden">Koude schotels &amp; maaltijden</option>
        <option value="Bakkerij">Bakkerij</option>
        <option value="Drankjes">Drankjes</option>
        <option value="Schotels">Schotels</option>
        <option value="Overige">Overige</option>
      </select>
      <input id="new-item-price"    type="number" step="0.01" placeholder="Prijs (€)"
             class="w-28 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
      <button onclick="addMenuItem()"
              class="bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
        + Toevoegen
      </button>
    </div>

    <div id="menu-list" class="space-y-1 text-sm">
      <p class="text-gray-400 text-center py-4">Laden…</p>
    </div>
  </section>

</main>

<script>
const API = '';
let currentDate = todayStr();

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

async function init() {
  document.getElementById('date-picker').value = currentDate;
  await loadDate();
  await loadBalances();
  await loadMenuList();
}

// ── Bestellingen laden ────────────────────────────────────────────────────────

async function loadDate() {
  currentDate = document.getElementById('date-picker').value || todayStr();
  const res = await fetch(`${API}/api/orders?order_date=${currentDate}`);
  const data = await res.json();

  document.getElementById('orders-date-label').textContent =
    `— ${formatDate(currentDate)}`;

  const emailBtn = document.getElementById('btn-send-email');
  if (data.email_sent) {
    emailBtn.disabled = true;
    emailBtn.textContent = '✅ Mail verstuurd';
  } else {
    emailBtn.disabled = false;
    emailBtn.textContent = '📧 Mail versturen';
  }

  if (data.advancer) {
    document.getElementById('advancer-input').value = data.advancer;
  }

  renderOrdersTable(data.orders, data.advancer);
}

function renderOrdersTable(orders, advancer) {
  const container = document.getElementById('orders-table');
  if (!orders.length) {
    container.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">Geen bestellingen voor deze dag.</p>';
    return;
  }

  container.innerHTML = `
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-xs text-gray-400 uppercase border-b border-gray-100">
          <th class="pb-2 pr-4">Naam</th>
          <th class="pb-2 pr-4">Bestelling</th>
          <th class="pb-2 pr-4">Bedrag</th>
          <th class="pb-2 pr-4">Voorschieter</th>
          <th class="pb-2">Terugbetaald</th>
        </tr>
      </thead>
      <tbody>
        ${orders.map(o => `
        <tr class="border-b border-gray-50 hover:bg-gray-50">
          <td class="py-2.5 pr-4 font-medium text-gray-800 whitespace-nowrap">${escHtml(o.person_name)}</td>
          <td class="py-2.5 pr-4 text-gray-600">
            ${o.items.map(i => `${i.quantity}× ${escHtml(i.name)}${i.notes ? ` <span class="text-gray-400 text-xs">(${escHtml(i.notes)})</span>` : ''}`).join('<br>')}
            ${o.notes ? `<br><span class="text-gray-400 text-xs italic">${escHtml(o.notes)}</span>` : ''}
          </td>
          <td class="py-2.5 pr-4 whitespace-nowrap">
            ${o.amount != null ? `€${o.amount.toFixed(2)}` : '<span class="text-gray-300">—</span>'}
          </td>
          <td class="py-2.5 pr-4 text-gray-500 whitespace-nowrap">
            ${o.advanced_by ? escHtml(o.advanced_by) : '<span class="text-gray-300">—</span>'}
          </td>
          <td class="py-2.5">
            ${o.advanced_by ? `
              <button onclick="${o.repaid ? 'unmarkRepaid' : 'markRepaid'}(${o.id})"
                      class="px-3 py-1 rounded-full text-xs font-medium transition
                             ${o.repaid
                               ? 'bg-green-100 text-green-700 hover:bg-green-200'
                               : 'bg-red-50 text-red-500 hover:bg-red-100'}">
                ${o.repaid ? '✓ Betaald' : '✗ Niet betaald'}
              </button>` : '<span class="text-gray-300 text-xs">n.v.t.</span>'}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Voorschieter instellen ────────────────────────────────────────────────────

async function setAdvancer() {
  const advancer = document.getElementById('advancer-input').value.trim();
  if (!advancer) return;
  await fetch(`${API}/api/payments/advance`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ advancer, date: currentDate }),
  });
  await loadDate();
  await loadBalances();
}

// ── Terugbetaling ─────────────────────────────────────────────────────────────

async function markRepaid(id) {
  await fetch(`${API}/api/payments/repaid`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ order_id: id }),
  });
  await loadDate();
  await loadBalances();
}

async function unmarkRepaid(id) {
  await fetch(`${API}/api/payments/unrepaid/${id}`, { method: 'POST' });
  await loadDate();
  await loadBalances();
}

// ── E-mail versturen ──────────────────────────────────────────────────────────

async function sendEmail() {
  const statusEl = document.getElementById('email-status');
  statusEl.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700', 'border-green-200', 'border-red-200');

  const res = await fetch(`${API}/api/send-email?order_date=${currentDate}`, { method: 'POST' });
  const data = await res.json();

  if (res.ok) {
    statusEl.className = 'text-sm rounded-2xl px-5 py-3 font-medium bg-green-50 border border-green-200 text-green-700';
    statusEl.textContent = '✅ ' + data.message;
  } else {
    statusEl.className = 'text-sm rounded-2xl px-5 py-3 font-medium bg-red-50 border border-red-200 text-red-700';
    statusEl.textContent = '❌ ' + (data.detail || 'Onbekende fout');
  }
  statusEl.classList.remove('hidden');
  await loadDate();
  setTimeout(() => statusEl.classList.add('hidden'), 6000);
}

// ── Schulden ──────────────────────────────────────────────────────────────────

async function loadBalances() {
  const res = await fetch(`${API}/api/balances`);
  const data = await res.json();
  const container = document.getElementById('balances');

  if (!data.length) {
    container.innerHTML = '<p class="text-green-600 text-sm text-center py-4">🎉 Geen openstaande schulden!</p>';
    return;
  }

  container.innerHTML = data.map(group => `
    <div class="border border-gray-100 rounded-xl p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="font-semibold text-gray-800">
          Verschuldigd aan <span class="text-orange-600">${escHtml(group.advancer)}</span>
        </p>
        <span class="text-sm font-bold text-red-500">€${group.total_open.toFixed(2)} open</span>
      </div>
      <div class="space-y-1">
        ${group.debtors.map(d => `
          <div class="flex items-center justify-between text-sm text-gray-600 py-1 border-t border-gray-50">
            <span>${escHtml(d.person)} <span class="text-gray-400 text-xs">${formatDate(d.date)}</span></span>
            <div class="flex items-center gap-3">
              <span>${d.amount != null ? `€${d.amount.toFixed(2)}` : '?'}</span>
              <button onclick="markRepaid(${d.order_id})"
                      class="text-xs bg-orange-50 hover:bg-orange-100 text-orange-600 px-2 py-1 rounded-lg transition">
                Betaald ✓
              </button>
            </div>
          </div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ── Menu beheren ──────────────────────────────────────────────────────────────

async function loadMenuList() {
  const res = await fetch(`${API}/api/menu`);
  const items = await res.json();
  const container = document.getElementById('menu-list');

  if (!items.length) {
    container.innerHTML = '<p class="text-gray-400 text-center py-4">Geen menu-items gevonden.</p>';
    return;
  }

  const byCategory = items.reduce((acc, i) => {
    (acc[i.category] = acc[i.category] || []).push(i);
    return acc;
  }, {});

  container.innerHTML = Object.entries(byCategory).map(([cat, catItems]) => `
    <div class="mb-3">
      <p class="text-xs font-semibold text-gray-400 uppercase mb-1">${escHtml(cat)}</p>
      ${catItems.map(i => `
        <div class="flex items-center justify-between py-1.5 px-2 hover:bg-gray-50 rounded-lg">
          <span class="text-gray-700">${escHtml(i.name)}</span>
          <div class="flex items-center gap-3 shrink-0">
            ${i.price != null ? `<span class="text-xs text-gray-400">€${i.price.toFixed(2)}</span>` : ''}
            <button onclick="deleteMenuItem(${i.id})"
                    class="text-gray-300 hover:text-red-400 text-lg leading-none transition">×</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

async function addMenuItem() {
  const name = document.getElementById('new-item-name').value.trim();
  const category = document.getElementById('new-item-category').value;
  const priceRaw = document.getElementById('new-item-price').value;
  const price = priceRaw ? parseFloat(priceRaw) : null;

  if (!name) return;

  await fetch(`${API}/api/menu/item`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, category, price }),
  });

  document.getElementById('new-item-name').value = '';
  document.getElementById('new-item-price').value = '';
  await loadMenuList();
}

async function deleteMenuItem(id) {
  if (!confirm('Item verwijderen?')) return;
  await fetch(`${API}/api/menu/item/${id}`, { method: 'DELETE' });
  await loadMenuList();
}

async function scrapeMenu() {
  const res = await fetch(`${API}/api/menu/refresh`, { method: 'POST' });
  const data = await res.json();
  alert(data.message);
  await loadMenuList();
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function formatDate(iso) {
  return new Date(iso + 'T00:00:00').toLocaleDateString('nl-BE', {
    weekday: 'short', day: 'numeric', month: 'short',
  });
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
