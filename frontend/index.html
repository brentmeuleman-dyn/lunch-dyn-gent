<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch Dynapps Gent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .category-tab.active { @apply bg-orange-500 text-white; }
    .item-card.selected  { @apply ring-2 ring-orange-500 bg-orange-50; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<!-- Header -->
<header class="bg-white shadow-sm sticky top-0 z-10">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-800">🥪 Lunch Dynapps Gent</h1>
      <p id="deadline-badge" class="text-xs text-gray-500 mt-0.5"></p>
    </div>
    <a href="/admin" class="text-sm text-orange-500 hover:underline font-medium">Admin →</a>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 py-6 space-y-6">

  <!-- Naam invoer -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <h2 class="font-semibold text-gray-700 mb-3">Wie ben jij?</h2>
    <input id="person-name" type="text" placeholder="Voornaam Achternaam"
           class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
  </section>

  <!-- Menu -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold text-gray-700">Menu van vandaag</h2>
      <button id="btn-refresh" onclick="loadMenu()"
              class="text-xs text-orange-500 hover:underline">↻ Vernieuwen</button>
    </div>

    <!-- Categorie-tabs -->
    <div id="category-tabs" class="flex flex-wrap gap-2 mb-4"></div>

    <!-- Productenlijst -->
    <div id="menu-items" class="space-y-2"></div>

    <p id="menu-empty" class="hidden text-sm text-gray-400 text-center py-8">
      Geen menu geladen. Klik op Vernieuwen of voeg producten toe via de admin-pagina.
    </p>
  </section>

  <!-- Winkelmandje -->
  <section id="cart-section" class="hidden bg-white rounded-2xl shadow-sm p-5">
    <h2 class="font-semibold text-gray-700 mb-3">Jouw bestelling</h2>
    <div id="cart-items" class="space-y-2 mb-4"></div>
    <textarea id="order-notes" placeholder="Extra opmerkingen (optioneel)…"
              class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-400" rows="2"></textarea>
  </section>

  <!-- Bevestigen -->
  <button id="btn-order" onclick="submitOrder()"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl shadow transition disabled:opacity-40 disabled:cursor-not-allowed">
    Bestelling plaatsen
  </button>

  <!-- Bevestigingsmelding -->
  <div id="success-banner" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-2xl px-5 py-4 text-sm font-medium text-center"></div>
  <div id="error-banner"   class="hidden bg-red-50   border border-red-200   text-red-700   rounded-2xl px-5 py-4 text-sm font-medium text-center"></div>

  <!-- Wie heeft er al besteld? -->
  <section class="bg-white rounded-2xl shadow-sm p-5">
    <h2 class="font-semibold text-gray-700 mb-3">Bestellingen van vandaag</h2>
    <div id="today-orders" class="space-y-1 text-sm text-gray-600">
      <p class="text-gray-400 text-sm">Laden…</p>
    </div>
  </section>

</main>

<script>
const API = '';
let menuItems = [];
let cart = {};          // { itemName: { name, quantity, notes } }
let activeCategory = null;

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  renderDeadline();
  await loadMenu();
  await loadTodayOrders();
}

function renderDeadline() {
  const now = new Date();
  const deadline = new Date(); deadline.setHours(10, 0, 0, 0);
  const badge = document.getElementById('deadline-badge');
  if (now > deadline) {
    badge.textContent = '⛔ Besteldeadline verstreken (10:00)';
    badge.classList.add('text-red-500');
    document.getElementById('btn-order').disabled = true;
  } else {
    const diff = Math.round((deadline - now) / 60000);
    badge.textContent = `⏰ Bestellen kan nog – deadline om 10:00 (nog ${diff} min)`;
  }
}

// ── Menu ──────────────────────────────────────────────────────────────────────

async function loadMenu() {
  const res = await fetch(`${API}/api/menu`);
  menuItems = await res.json();

  const categories = [...new Set(menuItems.map(i => i.category))];
  if (!activeCategory && categories.length) activeCategory = categories[0];

  renderCategoryTabs(categories);
  renderMenuItems();
}

function renderCategoryTabs(categories) {
  const container = document.getElementById('category-tabs');
  container.innerHTML = categories.map(cat => `
    <button onclick="setCategory('${cat}')"
            class="category-tab px-3 py-1.5 rounded-full text-xs font-medium border border-gray-200 hover:bg-orange-100 transition ${cat === activeCategory ? 'bg-orange-500 text-white border-orange-500' : 'text-gray-600'}">
      ${cat}
    </button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategoryTabs([...new Set(menuItems.map(i => i.category))]);
  renderMenuItems();
}

function renderMenuItems() {
  const filtered = menuItems.filter(i => i.category === activeCategory);
  const container = document.getElementById('menu-items');
  const empty = document.getElementById('menu-empty');

  if (!filtered.length) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  container.innerHTML = filtered.map(item => {
    const inCart = cart[item.name];
    return `
    <div id="card-${item.id}" class="item-card border border-gray-100 rounded-xl p-3 flex items-center justify-between gap-3 cursor-pointer hover:bg-orange-50 transition ${inCart ? 'ring-2 ring-orange-500 bg-orange-50' : ''}"
         onclick="toggleItem(${item.id}, '${escHtml(item.name)}')">
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">${escHtml(item.name)}</p>
        ${item.description ? `<p class="text-xs text-gray-400 truncate">${escHtml(item.description)}</p>` : ''}
      </div>
      <div class="flex items-center gap-2 shrink-0">
        ${item.price ? `<span class="text-xs font-semibold text-orange-500">€${item.price.toFixed(2)}</span>` : ''}
        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center text-xs
                    ${inCart ? 'bg-orange-500 border-orange-500 text-white' : 'border-gray-300 text-gray-300'}">
          ${inCart ? '✓' : '+'}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleItem(id, name) {
  if (cart[name]) {
    delete cart[name];
  } else {
    cart[name] = { name, quantity: 1, notes: '' };
  }
  renderMenuItems();
  renderCart();
}

// ── Winkelmandje ─────────────────────────────────────────────────────────────

function renderCart() {
  const section = document.getElementById('cart-section');
  const container = document.getElementById('cart-items');
  const items = Object.values(cart);

  if (!items.length) { section.classList.add('hidden'); return; }
  section.classList.remove('hidden');

  container.innerHTML = items.map(item => `
    <div class="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0">
      <button onclick="removeFromCart('${escHtml(item.name)}')"
              class="text-gray-300 hover:text-red-400 text-lg leading-none">×</button>
      <span class="flex-1 text-sm text-gray-700">${escHtml(item.name)}</span>
      <div class="flex items-center gap-1">
        <button onclick="changeQty('${escHtml(item.name)}', -1)"
                class="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-sm font-bold flex items-center justify-center">−</button>
        <span class="w-5 text-center text-sm font-medium">${item.quantity}</span>
        <button onclick="changeQty('${escHtml(item.name)}', 1)"
                class="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-sm font-bold flex items-center justify-center">+</button>
      </div>
      <input type="text" placeholder="opmerking…" value="${escHtml(item.notes)}"
             oninput="setNotes('${escHtml(item.name)}', this.value)"
             class="w-28 text-xs border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-1 focus:ring-orange-300" />
    </div>
  `).join('');
}

function removeFromCart(name) { delete cart[name]; renderMenuItems(); renderCart(); }
function changeQty(name, delta) {
  if (!cart[name]) return;
  cart[name].quantity = Math.max(1, cart[name].quantity + delta);
  renderCart();
}
function setNotes(name, val) { if (cart[name]) cart[name].notes = val; }

// ── Bestelling plaatsen ───────────────────────────────────────────────────────

async function submitOrder() {
  const name = document.getElementById('person-name').value.trim();
  if (!name) { showError('Voer eerst je naam in.'); return; }

  const items = Object.values(cart);
  if (!items.length) { showError('Selecteer minstens één item.'); return; }

  const notes = document.getElementById('order-notes').value.trim();

  try {
    const res = await fetch(`${API}/api/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ person_name: name, items, notes: notes || null }),
    });
    const data = await res.json();

    if (!res.ok) { showError(data.detail || 'Er is een fout opgetreden.'); return; }

    cart = {};
    document.getElementById('person-name').value = '';
    document.getElementById('order-notes').value = '';
    renderMenuItems();
    renderCart();
    showSuccess(`✅ Bestelling geplaatst voor ${name}!`);
    await loadTodayOrders();
  } catch {
    showError('Verbinding mislukt – probeer opnieuw.');
  }
}

// ── Huidige bestellingen ──────────────────────────────────────────────────────

async function loadTodayOrders() {
  const res = await fetch(`${API}/api/orders`);
  const data = await res.json();
  const container = document.getElementById('today-orders');

  if (!data.orders.length) {
    container.innerHTML = '<p class="text-gray-400 text-sm">Nog niemand besteld vandaag.</p>';
    return;
  }

  container.innerHTML = data.orders.map(o => `
    <div class="flex items-start gap-2 py-1.5 border-b border-gray-50 last:border-0">
      <span class="text-green-500 mt-0.5 shrink-0">✓</span>
      <div>
        <span class="font-medium text-gray-800">${escHtml(o.person_name)}</span>
        <span class="text-gray-400 text-xs ml-1">
          – ${o.items.map(i => `${i.quantity}× ${i.name}`).join(', ')}
        </span>
      </div>
    </div>
  `).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function showSuccess(msg) {
  const el = document.getElementById('success-banner');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('error-banner').classList.add('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('success-banner').classList.add('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
